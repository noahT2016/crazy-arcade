<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON DASH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;background:#000;}
#c{display:block;position:fixed;inset:0;}
#ui{position:fixed;top:0;left:0;right:0;z-index:10;padding:8px 14px;display:none;pointer-events:none;}
#progbar{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
#progfill{height:100%;width:0%;background:linear-gradient(90deg,#00e5ff,#a855f7);border-radius:3px;box-shadow:0 0 8px #00e5ff;}
#pct{font-family:Orbitron,sans-serif;font-size:10px;color:rgba(255,255,255,0.4);text-align:right;margin-top:3px;letter-spacing:1px;}
#att{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-family:Orbitron,sans-serif;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:2px;z-index:10;pointer-events:none;display:none;}
#lvlbadge{position:fixed;top:30px;right:14px;font-family:Orbitron,sans-serif;font-size:10px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:1px;z-index:10;pointer-events:none;display:none;}
#ov{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:28px;background:radial-gradient(ellipse at center,#080018 0%,#000 100%);}
.t1{font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:4px;color:rgba(100,200,255,0.5);text-transform:uppercase;}
.t2{font-family:Orbitron,sans-serif;font-size:44px;font-weight:900;line-height:1;text-align:center;background:linear-gradient(135deg,#00e5ff,#ffffff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.t3{font-family:Orbitron,sans-serif;font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);padding:5px 18px;border-radius:20px;}
.t4{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;max-width:240px;line-height:1.6;}
.sc{font-family:Orbitron,sans-serif;font-size:22px;font-weight:700;color:#00e5ff;}
.lvlrow{display:flex;gap:10px;}
.lvlbtn{font-family:Orbitron,sans-serif;font-size:12px;font-weight:700;padding:10px 24px;border:2px solid rgba(255,255,255,0.2);border-radius:30px;background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;transition:all .2s;}
.lvlbtn:active{transform:scale(0.95);}
.lvlbtn.active{background:linear-gradient(135deg,#7c3aed,#0ea5e9);border-color:transparent;box-shadow:0 4px 16px rgba(124,58,237,0.4);}
.lvlbtn.locked{opacity:0.35;cursor:default;}
.btn{font-family:Orbitron,sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;padding:13px 44px;border:none;border-radius:50px;background:linear-gradient(135deg,#7c3aed,#0ea5e9);color:#fff;cursor:pointer;margin-top:4px;}
.btn:active{transform:scale(0.96);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"><div id="progbar"><div id="progfill"></div></div><div id="pct">0%</div></div>
<div id="att">ATTEMPT 1</div>
<div id="lvlbadge">LEVEL 1</div>
<div id="ov">
  <div class="t1">Geometry Dash</div>
  <div class="t2">NEON<br>DASH</div>
  <div class="t4">Tap or hold to jump. Land on blocks. Dodge spikes.</div>
  <div class="lvlrow">
    <div class="lvlbtn active" id="btn1" onclick="selectLevel(1)">LEVEL 1<br><span style="font-size:9px;opacity:0.7">Stereo Madness</span></div>
    <div class="lvlbtn" id="btn2" onclick="selectLevel(2)">LEVEL 2<br><span style="font-size:9px;opacity:0.7">Back On Track</span></div>
  </div>
  <button class="btn" id="sb">PLAY</button>
  <div class="sc" id="bestsc" style="font-size:14px;opacity:0.5;margin-top:-4px;"></div>
</div>
<script>
var C=document.getElementById("c"),X=C.getContext("2d"),W,H;
function rsz(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
rsz();window.addEventListener("resize",rsz);

var ui=document.getElementById("ui"),pf=document.getElementById("progfill"),
    pt=document.getElementById("pct"),attEl=document.getElementById("att"),
    lvlbadgeEl=document.getElementById("lvlbadge"),
    ov=document.getElementById("ov"),sb=document.getElementById("sb"),
    bestsc=document.getElementById("bestsc");

var SPD=4.0, GRAV=0.48, JV=-10.2, CS=34, T=40;
function GY(){return Math.floor(H*0.70);}

var px,py,vy,gr,rot,dead,running,holding,camX,attempts,bestPct,fr,parts,jumpLock;
var currentLevel=1, best={1:0,2:0};

// ── LEVEL 1: Stereo Madness ────────────────────────────────────────────────
var L1_TOTAL=210;
var L1_BLOCKS=[
  [30,0,1,1],[42,0,1,1],[53,0,1,1],[65,0,1,1],
  [79,0,1,1],[91,0,1,1],[105,0,1,1],[119,0,1,1],
  [132,0,1,1],[146,0,1,1],[161,0,1,1],[175,0,1,1],[190,0,1,1],
];
var L1_SPIKES=[
  [25,0],[35,0],[46,0],[58,0],[70,0],[83,0],[96,0],
  [110,0],[124,0],[138,0],[139,0],[153,0],[168,0],[183,0],[198,0],[199,0],
];

// ── LEVEL 2: Back On Track ─────────────────────────────────────────────────
// harder: lower jumps, more spikes, triple blocks back
var L2_TOTAL=220;
var L2_BLOCKS=[
  [33,0,1,1],
  [44,0,1,1],[45,1,1,1],[46,0,1,1],
  [57,0,2,1],
  [70,0,1,1],[71,1,1,1],[72,2,1,1],
  [84,0,1,1],[85,1,1,1],[86,2,1,1],[87,2,1,1],[88,1,1,1],[89,0,1,1],
  [107,0,2,1],
  [119,0,1,1],[120,1,1,1],[121,2,1,1],
  [134,0,1,1],[135,1,1,1],[136,2,1,1],[137,2,1,1],[138,1,1,1],[139,0,1,1],
  [152,0,2,1],
  [163,0,1,1],[164,1,1,1],[165,2,1,1],
  [176,0,1,1],[177,1,1,1],[178,2,1,1],[179,2,1,1],[180,1,1,1],[181,0,1,1],
  [193,0,3,1],
];
var L2_SPIKES=[
  [28,0],
  [38,0],
  [50,0],[51,0],
  [63,0],
  [76,0],[77,0],
  [90,0],
  [103,0],[104,0],
  [117,0],
  [130,0],[131,0],
  [144,0],
  [158,0],[159,0],
  [172,0],
  [186,0],[187,0],
  [200,0],
];

var BLK=[], SPK=[], TOTAL=L1_TOTAL;

function buildLevel(lvl){
  var blocks = lvl===2 ? L2_BLOCKS : L1_BLOCKS;
  var spikes = lvl===2 ? L2_SPIKES : L1_SPIKES;
  TOTAL = lvl===2 ? L2_TOTAL : L1_TOTAL;
  BLK=blocks.map(function(b){return{wx:b[0]*T,wy:b[1]*T,w:b[2]*T,h:b[3]*T};});
  SPK=spikes.map(function(s){return{wx:s[0]*T,wy:s[1]*T};});
}

function initPlayer(){
  var gnd=GY();
  px=W*0.20;py=gnd-CS;vy=0;gr=false;rot=0;dead=false;jumpLock=0;
}

function jump(){
  if(gr&&!dead&&jumpLock<=0){
    vy=currentLevel===2?JV*0.88:JV; // level 2 has lower jumps
    gr=false;jumpLock=8;spawnJumpParts();
  }
}

function spawnJumpParts(){
  for(var i=0;i<5;i++){
    var a=Math.PI+Math.random()*Math.PI;
    parts.push({x:px+CS/2,y:py+CS,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5-0.5,r:3,life:1,decay:0.08,col:"#00e5ff"});
  }
}
function spawnDieParts(){
  for(var i=0;i<18;i++){
    var a=Math.random()*Math.PI*2,s=2+Math.random()*7;
    parts.push({x:px+CS/2,y:py+CS/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*5,life:1,decay:0.025,col:i%2?"#00e5ff":"#a855f7"});
  }
}

function ovlp(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function update(){
  if(!running)return;
  fr++;
  var gnd=GY();
  camX+=SPD;
  if(jumpLock>0)jumpLock--;

  if(dead){
    for(var i=parts.length-1;i>=0;i--){
      var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=p.decay;
      if(p.life<=0)parts.splice(i,1);
    }
    return;
  }

  vy+=GRAV; py+=vy;
  if(!gr)rot=(rot+7)%360;

  // ground
  if(py+CS>=gnd){
    py=gnd-CS;vy=0;gr=true;
    rot=Math.round(rot/90)*90;
    if(holding&&jumpLock<=0)jump();
  }
  if(py<0){py=0;vy=Math.abs(vy)*0.4;}

  var pwx=camX+px;

  // block collision
  for(var i=0;i<BLK.length;i++){
    var b=BLK[i];
    var btop=gnd-b.wy-b.h,bleft=b.wx,bright=b.wx+b.w;
    if(!ovlp(pwx,py,CS,CS,bleft,btop,b.w,b.h))continue;
    var prevPY=py-vy;
    if(vy>=0&&prevPY+CS<=btop+10){
      py=btop-CS;vy=0;gr=true;
      rot=Math.round(rot/90)*90;
      if(holding&&jumpLock<=0)jump();
    } else {
      killPlayer();return;
    }
  }

  // spike collision
  var sw=T*0.5,sh=T*0.72;
  for(var i=0;i<SPK.length;i++){
    var s=SPK[i];
    var stx=s.wx+(T-sw)/2,sty=gnd-s.wy-sh;
    if(ovlp(pwx+5,py+5,CS-10,CS-10,stx,sty,sw,sh*0.35)){
      killPlayer();return;
    }
  }

  // particles
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.vx*=0.96;p.life-=p.decay;
    if(p.life<=0)parts.splice(i,1);
  }

  var pct=Math.min(100,Math.floor(camX/(TOTAL*T)*100));
  if(pct>best[currentLevel])best[currentLevel]=pct;
  pf.style.width=pct+"%";pt.textContent=pct+"%";

  if(camX>=(TOTAL-2)*T)winLevel();
}

function killPlayer(){
  if(dead)return; // prevent double-kill
  dead=true;holding=false; // clear holding to prevent instant rejump
  spawnDieParts();attempts++;
  attEl.textContent="ATTEMPT "+attempts;
  setTimeout(function(){if(running)restart();},700);
}

function restart(){
  camX=0;initPlayer();parts=[];
}

function winLevel(){
  running=false;
  showOv("win");
}

function drawBg(){
  var gnd=GY();
  var col1=currentLevel===2?"#0d0005":"#000510";
  var col2=currentLevel===2?"#1a0015":"#050020";
  var g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,col1);g.addColorStop(0.65,col2);g.addColorStop(1,col1);
  X.fillStyle=g;X.fillRect(0,0,W,H);

  X.fillStyle=currentLevel===2?"rgba(40,0,30,0.7)":"rgba(20,0,50,0.7)";
  var off=(camX*0.08)%T;
  var bh=[0.12,0.20,0.15,0.25,0.18,0.10,0.22,0.16,0.19,0.13,0.21,0.14];
  var bw=T*1.8;
  for(var i=0;i<Math.ceil(W/bw)+2;i++){
    var bx=i*bw-off;
    X.fillRect(bx,gnd-gnd*bh[i%bh.length],bw-3,gnd*bh[i%bh.length]);
  }

  var gg=X.createLinearGradient(0,gnd,0,H);
  gg.addColorStop(0,currentLevel===2?"#1a0015":"#0a0030");
  gg.addColorStop(1,currentLevel===2?"#080008":"#020010");
  X.fillStyle=gg;X.fillRect(0,gnd,W,H-gnd);

  var glowCol=currentLevel===2?"#ff00aa":"#00e5ff";
  X.save();X.shadowColor=glowCol;X.shadowBlur=10;
  X.strokeStyle=currentLevel===2?"rgba(255,0,180,0.7)":"rgba(0,229,255,0.7)";X.lineWidth=2;
  X.beginPath();X.moveTo(0,gnd);X.lineTo(W,gnd);X.stroke();X.restore();

  var gridCol=currentLevel===2?"rgba(255,0,180,0.06)":"rgba(0,229,255,0.07)";
  var goff=(camX*1.0)%T;
  X.strokeStyle=gridCol;X.lineWidth=1;
  for(var x=-goff;x<W;x+=T){X.beginPath();X.moveTo(x,gnd);X.lineTo(x,H);X.stroke();}
  for(var y=gnd;y<H;y+=T*0.5){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}

  X.fillStyle="rgba(255,255,255,0.5)";
  for(var i=0;i<40;i++){
    var sx=((i*173+camX*0.03)%W+W)%W;
    var sy=((i*97)%(gnd*0.85));
    X.beginPath();X.arc(sx,sy,0.6+i%2*0.6,0,Math.PI*2);X.fill();
  }
}

function drawBlock(b){
  var gnd=GY();var sx=b.wx-camX,sy=gnd-b.wy-b.h;
  if(sx+b.w<-10||sx>W+10)return;
  X.save();
  var c1=currentLevel===2?"#3a1a4a":"#1a3a6a";
  var c2=currentLevel===2?"#4a1a6a":"#1e4a8a";
  var c3=currentLevel===2?"#1e0a2e":"#0e2244";
  var g=X.createLinearGradient(sx,sy,sx+b.w,sy+b.h);
  g.addColorStop(0,c1);g.addColorStop(0.4,c2);g.addColorStop(1,c3);
  X.fillStyle=g;X.shadowColor=currentLevel===2?"rgba(200,0,255,0.3)":"rgba(0,150,255,0.3)";X.shadowBlur=6;
  X.fillRect(sx,sy,b.w,b.h);
  X.strokeStyle=currentLevel===2?"rgba(200,0,255,0.5)":"rgba(0,200,255,0.5)";X.lineWidth=1.5;
  X.strokeRect(sx+0.75,sy+0.75,b.w-1.5,b.h-1.5);
  if(b.w>=T&&b.h>=T){
    X.strokeStyle=currentLevel===2?"rgba(200,0,255,0.12)":"rgba(0,180,255,0.12)";X.lineWidth=1;
    X.beginPath();X.moveTo(sx+5,sy+5);X.lineTo(sx+b.w-5,sy+5);X.stroke();
    X.beginPath();X.moveTo(sx+5,sy+5);X.lineTo(sx+5,sy+b.h-5);X.stroke();
  }
  X.restore();
}

function drawSpike(s){
  var gnd=GY();var sx=s.wx-camX;
  if(sx+T<-10||sx>W+10)return;
  var sh=T*0.78,spy=gnd-s.wy-sh;
  X.save();
  X.shadowColor=currentLevel===2?"rgba(255,0,100,0.6)":"rgba(255,40,80,0.6)";X.shadowBlur=8;
  X.fillStyle=currentLevel===2?"#ff0066":"#ff2244";
  X.beginPath();X.moveTo(sx+T*0.5,spy);X.lineTo(sx+T*0.08,gnd-s.wy);X.lineTo(sx+T*0.92,gnd-s.wy);X.closePath();X.fill();
  X.strokeStyle="rgba(255,100,120,0.4)";X.lineWidth=1;X.stroke();
  X.restore();
}

function drawPlayer(){
  if(dead)return;
  X.save();
  var cx=px+CS/2,cy=py+CS/2;
  X.globalAlpha=0.25;
  for(var i=0;i<3;i++){
    var tx=cx-(i+1)*SPD*1.2;
    X.fillStyle=currentLevel===2?"#cc00ff":"#00e5ff";
    X.fillRect(tx-CS/2+i*3,cy-CS/2+i*3,CS-i*6,CS-i*6);
  }
  X.globalAlpha=1;
  X.shadowColor=currentLevel===2?"#cc00ff":"#00e5ff";X.shadowBlur=18;
  X.translate(cx,cy);X.rotate(rot*Math.PI/180);
  var g=X.createLinearGradient(-CS/2,-CS/2,CS/2,CS/2);
  if(currentLevel===2){g.addColorStop(0,"#f0a0ff");g.addColorStop(0.45,"#cc00ff");g.addColorStop(1,"#660088");}
  else{g.addColorStop(0,"#80f0ff");g.addColorStop(0.45,"#00c8ee");g.addColorStop(1,"#0050aa");}
  X.fillStyle=g;X.fillRect(-CS/2,-CS/2,CS,CS);
  X.strokeStyle="rgba(255,255,255,0.55)";X.lineWidth=2;X.strokeRect(-CS/2+3,-CS/2+3,CS-6,CS-6);
  X.strokeStyle="rgba(255,255,255,0.2)";X.lineWidth=1;
  X.beginPath();X.moveTo(-CS/2+6,-CS/2+6);X.lineTo(CS/2-6,CS/2-6);X.stroke();
  X.beginPath();X.moveTo(CS/2-6,-CS/2+6);X.lineTo(-CS/2+6,CS/2-6);X.stroke();
  X.restore();
}

function drawParts(){
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    X.save();X.globalAlpha=Math.max(0,p.life);
    X.fillStyle=p.col;X.shadowColor=p.col;X.shadowBlur=8;
    X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();X.restore();
  }
}

function drawEnd(){
  var gnd=GY(),ex=(TOTAL-3)*T-camX;
  if(ex>W+10||ex<-T*4)return;
  X.save();
  X.strokeStyle="rgba(0,255,150,0.8)";X.lineWidth=4;X.shadowColor="#00ff88";X.shadowBlur=20;
  var ph=gnd*0.55;
  X.strokeRect(ex,gnd-ph,T*2,ph);
  X.fillStyle="rgba(0,255,100,0.08)";X.fillRect(ex,gnd-ph,T*2,ph);
  X.fillStyle="#00ff88";X.font="bold 11px Orbitron,sans-serif";X.textAlign="center";
  X.fillText("END",ex+T,gnd-ph/2);X.restore();
}

function draw(){
  X.clearRect(0,0,W,H);drawBg();
  for(var i=0;i<BLK.length;i++)drawBlock(BLK[i]);
  for(var i=0;i<SPK.length;i++)drawSpike(SPK[i]);
  drawEnd();drawParts();drawPlayer();
}

function loop(){draw();update();requestAnimationFrame(loop);}

function dn(e){if(e&&e.preventDefault)e.preventDefault();if(!running)return;holding=true;jump();}
function up(e){if(e&&e.preventDefault)e.preventDefault();holding=false;}
C.addEventListener("touchstart",dn,{passive:false});C.addEventListener("touchend",up,{passive:false});
C.addEventListener("mousedown",dn);C.addEventListener("mouseup",up);
document.addEventListener("keydown",function(e){if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();dn();}});
document.addEventListener("keyup",function(e){if(e.code==="Space"||e.code==="ArrowUp")up();});

function selectLevel(n){
  currentLevel=n;
  document.getElementById("btn1").className="lvlbtn"+(n===1?" active":"");
  document.getElementById("btn2").className="lvlbtn"+(n===2?" active":"");
  bestsc.textContent=best[n]>0?"Best: "+best[n]+"%":"";
}

function showOv(mode){
  running=false;ov.style.display="flex";ui.style.display="none";attEl.style.display="none";lvlbadgeEl.style.display="none";
  if(mode==="win"){
    ov.innerHTML="<div class=\"t1\">Level Complete!</div>"
      +"<div class=\"t2\" style=\"font-size:36px;background:linear-gradient(135deg,#4ade80,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text\">YOU WIN!</div>"
      +"<div class=\"t3\">"+( currentLevel===1?"Stereo Madness":"Back On Track")+" Cleared!</div>"
      +"<div class=\"sc\">"+best[currentLevel]+"% Best &nbsp;|&nbsp; "+attempts+" attempts</div>"
      +"<div class=\"lvlrow\"><div class=\"lvlbtn active\" id=\"btn1\" onclick=\"selectLevel(1)\">LEVEL 1<br><span style=\"font-size:9px;opacity:0.7\">Stereo Madness</span></div>"
      +"<div class=\"lvlbtn\" id=\"btn2\" onclick=\"selectLevel(2)\">LEVEL 2<br><span style=\"font-size:9px;opacity:0.7\">Back On Track</span></div></div>"
      +"<button class=\"btn\" id=\"sb\">PLAY AGAIN</button>";
    document.getElementById("sb").addEventListener("click",startGame);
    document.getElementById("sb").addEventListener("touchend",function(e){e.preventDefault();startGame();},{passive:false});
    document.getElementById("btn1").addEventListener("click",function(){selectLevel(1);});
    document.getElementById("btn2").addEventListener("click",function(){selectLevel(2);});
  }
}

function startGame(){
  ov.style.display="none";ui.style.display="block";attEl.style.display="block";lvlbadgeEl.style.display="block";
  lvlbadgeEl.textContent="LEVEL "+currentLevel;
  buildLevel(currentLevel);
  camX=0;parts=[];attempts=1;bestPct=0;holding=false;running=true;fr=0;jumpLock=0;
  initPlayer();
  attEl.textContent="ATTEMPT 1";
  pf.style.width="0%";pt.textContent="0%";
  pf.style.background=currentLevel===2?"linear-gradient(90deg,#ff00aa,#a855f7)":"linear-gradient(90deg,#00e5ff,#a855f7)";
}

sb.addEventListener("click",startGame);
sb.addEventListener("touchend",function(e){e.preventDefault();startGame();},{passive:false});

parts=[];running=false;fr=0;bestPct=0;attempts=0;camX=0;BLK=[];SPK=[];currentLevel=1;
loop();
</script>
</body>
</html>
