<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DOODLE JUMP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;background:#1a4a1a;}
#c{display:block;position:fixed;inset:0;touch-action:none;}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;
  padding:10px 16px;display:none;flex-direction:row;align-items:flex-start;justify-content:space-between;}
#score-el{font-family:Nunito,sans-serif;font-size:26px;font-weight:900;color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,0.5);}
#best-el{font-family:Nunito,sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.6);
  text-align:right;margin-top:4px;}
#level-el{font-family:Orbitron,sans-serif;font-size:10px;font-weight:700;color:rgba(255,255,255,0.5);
  letter-spacing:2px;text-align:center;position:fixed;top:10px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;display:none;white-space:nowrap;}
#powerup-el{position:fixed;top:46px;left:50%;transform:translateX(-50%);
  font-family:Orbitron,sans-serif;font-size:11px;font-weight:700;color:#fbbf24;
  letter-spacing:1px;z-index:10;pointer-events:none;display:none;white-space:nowrap;}
#ov{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;padding:28px;background:rgba(0,0,0,0.0);
  transition:background 0.3s;}
#ov.dark{background:rgba(0,0,0,0.75);}
.ov-badge{font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:3px;
  color:rgba(255,220,100,0.9);text-transform:uppercase;
  background:rgba(0,0,0,0.4);padding:4px 14px;border-radius:20px;border:1px solid rgba(255,200,50,0.3);}
.ov-title{font-family:Nunito,sans-serif;font-size:54px;font-weight:900;line-height:1;
  text-align:center;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 40px rgba(100,255,100,0.3);}
.ov-sub{font-size:13px;color:rgba(255,255,255,0.7);text-align:center;
  max-width:260px;line-height:1.7;background:rgba(0,0,0,0.3);padding:8px 16px;border-radius:12px;}
.ov-score{font-family:Nunito,sans-serif;font-size:32px;font-weight:900;color:#fbbf24;
  text-shadow:0 0 16px rgba(251,191,36,0.5);}
.ov-best{font-size:13px;color:rgba(255,255,255,0.5);font-family:Nunito,sans-serif;font-weight:700;}
.btn{font-family:Orbitron,sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;
  padding:14px 48px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;cursor:pointer;
  box-shadow:0 6px 24px rgba(34,197,94,0.5);transition:transform .15s;margin-top:4px;}
.btn:active{transform:scale(0.95);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="score-el">0</div>
  <div id="best-el">BEST: 0</div>
</div>
<div id="level-el">FOREST</div>
<div id="powerup-el"></div>
<div id="ov">
  <div class="ov-badge">Tap to steer</div>
  <div class="ov-title">DOODLE<br>JUMP!</div>
  <div class="ov-sub">Land on platforms to bounce up. Steer with your finger. Avoid enemies!</div>
  <button class="btn" id="startbtn">JUMP IN!</button>
</div>
<script>
(function(){

var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// DOM refs
var hudEl     = document.getElementById('hud');
var scoreEl   = document.getElementById('score-el');
var bestEl    = document.getElementById('best-el');
var levelEl   = document.getElementById('level-el');
var powerupEl = document.getElementById('powerup-el');
var ovEl      = document.getElementById('ov');
var startbtn  = document.getElementById('startbtn');

// ── CONSTANTS ─────────────────────────────────────────────────────────────
var GRAVITY    = 0.38;
var JUMP_VEL   = -13.5;
var SPRING_VEL = -22;
var JETPACK_VEL= -2.0;   // applied per frame
var PLAYER_W   = 42;
var PLAYER_H   = 46;
var PLAT_H     = 14;
var STEER_SPD  = 7;

// Platform types
var P_NORMAL   = 0;
var P_MOVING   = 1;
var P_BREAK    = 2;
var P_SPRING   = 3;

// ── THEMES ────────────────────────────────────────────────────────────────
var THEMES = [
  { name:"FOREST",  height:0,     sky1:"#1a5c1a", sky2:"#0d2b0d",
    platCol:"#4ade80", platEdge:"#16a34a", platShadow:"#052e16",
    bgDeco:"trees",      enemyCol:"#dc2626", enemyName:"monster" },
  { name:"SPACE",   height:3000,  sky1:"#000010", sky2:"#000028",
    platCol:"#60a5fa", platEdge:"#1d4ed8", platShadow:"#1e3a5f",
    bgDeco:"stars",      enemyCol:"#a78bfa", enemyName:"alien" },
  { name:"HAUNTED", height:8000,  sky1:"#0a0018", sky2:"#1a0030",
    platCol:"#c084fc", platEdge:"#7c3aed", platShadow:"#2d0050",
    bgDeco:"ghosts",     enemyCol:"#c084fc", enemyName:"ghost" },
];

function getTheme(score){
  var t = THEMES[0];
  for(var i = THEMES.length-1; i >= 0; i--){
    if(score >= THEMES[i].height){ t = THEMES[i]; break; }
  }
  return t;
}

// ── STATE ─────────────────────────────────────────────────────────────────
var player, platforms=[], enemies=[], particles=[], floats=[];
var score, best, camShift, running, frame;
var touchX, touching;
var jetpackTimer, shieldTimer, lastThemeName;
var bgDecoItems = [];

function initGame(){
  score = 0; camShift = 0; frame = 0; running = true;
  touching = false; touchX = W/2;
  jetpackTimer = 0; shieldTimer = 0; lastThemeName = '';

  player = {
    x:     W/2 - PLAYER_W/2,
    y:     H * 0.65,
    vy:    JUMP_VEL,
    vx:    0,
    right: true,
    eye:   0,
  };

  platforms = [];
  enemies   = [];
  particles = [];
  floats    = [];

  // Starting platform directly under player
  platforms.push(makePlat(W/2 - 45, H*0.68, P_NORMAL, 90));

  // Generate initial set of platforms
  genPlatforms(H*0.60, -H*3);

  bgDecoItems = makeBgDecos();

  if(!best) best = 0;
  scoreEl.textContent = '0';
  bestEl.textContent  = 'BEST: ' + best;
  powerupEl.style.display = 'none';
  levelEl.style.display   = 'block';
  levelEl.textContent      = 'FOREST';
}

// ── PLATFORM FACTORY ──────────────────────────────────────────────────────
function makePlat(x, y, type, w){
  var pw = w || (62 + Math.floor(Math.random()*24));
  return {
    x:x, y:y, w:pw, h:PLAT_H,
    type:type,
    vx: (type===P_MOVING) ? (Math.random()>0.5?1.8:-1.8) : 0,
    broken:false, breakTimer:0,
    spring: (type===P_SPRING),
    jetpack: Math.random()<0.025,
    shield:  Math.random()<0.018,
  };
}

function genPlatforms(fromY, toY){
  var y = fromY;
  while(y > toY){
    var x    = Math.random() * Math.max(20, W - 80);
    var diff = Math.min(score / 12000, 0.9);
    var roll = Math.random();
    var type = P_NORMAL;
    if      (roll < 0.06 + diff*0.14) type = P_MOVING;
    else if (roll < 0.11 + diff*0.12) type = P_BREAK;
    else if (roll < 0.18)             type = P_SPRING;
    platforms.push(makePlat(x, y, type));
    var gap = 58 + Math.random()*38 + Math.min(score/600, 55);
    y -= gap;
  }
}

// ── BG DECORATIONS ────────────────────────────────────────────────────────
function makeBgDecos(){
  var items = [];
  for(var i=0;i<20;i++){
    items.push({
      x: Math.random()*W,
      y: Math.random()*H,
      size: 10+Math.random()*30,
      spd:  0.05+Math.random()*0.1,
      phase: Math.random()*Math.PI*2,
    });
  }
  return items;
}

// ── JUMP PARTICLES ────────────────────────────────────────────────────────
function spawnJumpParts(x, y, col){
  col = col || '#ffffff';
  for(var i=0;i<6;i++){
    var a = Math.PI + Math.random()*Math.PI;
    var s = 1+Math.random()*3.5;
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      r:2+Math.random()*3,col:col,life:1,decay:0.06+Math.random()*0.04});
  }
}
function spawnBoomParts(x, y, col){
  for(var i=0;i<18;i++){
    var a = Math.random()*Math.PI*2;
    var s = 2+Math.random()*6;
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      r:2+Math.random()*4,col:col,life:1,decay:0.025+Math.random()*0.02});
  }
}
function addFloat(x, y, text, col){
  floats.push({x:x,y:y,text:text,col:col||'#fff',life:1,size:15});
}

// ── UPDATE ────────────────────────────────────────────────────────────────
function update(){
  if(!running) return;
  frame++;

  // Theme check
  var theme = getTheme(score);
  if(theme.name !== lastThemeName){
    lastThemeName = theme.name;
    levelEl.textContent = theme.name;
    addFloat(W/2, H/2, '>> '+theme.name+' <<', '#fbbf24');
  }

  // Steer: move toward touch X
  if(touching){
    var dx = touchX - (player.x + PLAYER_W/2);
    player.vx += dx * 0.06;
    player.vx  = Math.max(-STEER_SPD, Math.min(STEER_SPD, player.vx));
  } else {
    player.vx *= 0.88;
  }

  // Jetpack
  if(jetpackTimer > 0){
    jetpackTimer--;
    // Smooth toward a steady upward velocity instead of additive
    player.vy += (JETPACK_VEL - player.vy) * 0.12;
    player.vy = Math.max(-14, player.vy);
    if(Math.random()<0.15) particles.push({
      x:player.x+PLAYER_W/2+(Math.random()-0.5)*8,
      y:player.y+PLAYER_H,
      vx:(Math.random()-0.5)*1,vy:1.5+Math.random()*1.5,
      r:2+Math.random()*2,col:'#f97316',life:1,decay:0.09});
    if(jetpackTimer===0){
      powerupEl.style.display='none';
    } else {
      powerupEl.style.display='block';
      powerupEl.textContent='🚀 JETPACK '+(Math.ceil(jetpackTimer/60))+'s';
    }
  } else {
    player.vy += GRAVITY;
  }

  // Shield timer display
  if(shieldTimer>0){
    shieldTimer--;
    if(shieldTimer===0) powerupEl.style.display='none';
    else{
      powerupEl.style.display='block';
      powerupEl.textContent='🛡 SHIELD '+(Math.ceil(shieldTimer/60))+'s';
    }
  }

  // Move player
  player.x += player.vx;
  player.y += player.vy;

  // Face direction
  if(player.vx >  0.3) player.right = true;
  if(player.vx < -0.3) player.right = false;

  // Wrap horizontally
  if(player.x + PLAYER_W < 0) player.x = W;
  if(player.x > W)             player.x = -PLAYER_W;

  // Camera: when player rises above 40% of screen, shift world down
  if(player.y < H * 0.4 && jetpackTimer===0 || player.y < H*0.25){
    var shift = H * 0.38 - player.y;
    if(shift < 0) shift = H * 0.22 - player.y;
    if(player.y < H*0.38){
      var shift2 = H*0.38 - player.y;
      player.y  += shift2;
      camShift  += shift2;
      for(var i=0;i<platforms.length;i++) platforms[i].y += shift2;
      for(var i=0;i<enemies.length;i++)   enemies[i].y   += shift2;
      for(var i=0;i<particles.length;i++) particles[i].y += shift2;
      for(var i=0;i<floats.length;i++)    floats[i].y    += shift2;
    }
  }

  // Score from height
  var newScore = Math.floor(camShift / 9);
  if(newScore > score){
    score = newScore;
    scoreEl.textContent = score;
    if(score > best){ best = score; bestEl.textContent = 'BEST: '+best; }
  }

  // Platform collision — only when falling (vy > 0), no jetpack
  if(player.vy > 0 && jetpackTimer === 0){
    var pb = player.y + PLAYER_H;
    var pl = player.x + 6;
    var pr = player.x + PLAYER_W - 6;
    for(var i=0;i<platforms.length;i++){
      var p = platforms[i];
      if(p.broken) continue;
      var prevB = pb - player.vy;
      // Foot must cross platform top this frame
      if(pb >= p.y && prevB <= p.y + p.h &&
         pr > p.x  && pl < p.x + p.w){
        // Land!
        player.y = p.y - PLAYER_H;
        if(p.spring){
          player.vy = SPRING_VEL;
          spawnJumpParts(player.x+PLAYER_W/2, player.y+PLAYER_H, '#4ade80');
          addFloat(player.x+PLAYER_W/2, p.y-20, 'SPRING! +50', '#4ade80');
          score += 50; scoreEl.textContent = score;
        } else if(p.type === P_BREAK){
          player.vy = JUMP_VEL;
          p.broken = true; p.breakTimer = 18;
          spawnJumpParts(player.x+PLAYER_W/2, player.y+PLAYER_H, '#f97316');
        } else {
          player.vy = JUMP_VEL;
          spawnJumpParts(player.x+PLAYER_W/2, player.y+PLAYER_H, '#fff');
        }
        // Collect jetpack
        if(p.jetpack && jetpackTimer===0){
          p.jetpack = false;
          jetpackTimer = 180;
          addFloat(player.x+PLAYER_W/2, p.y-20, 'JETPACK! +100', '#f97316');
          score += 100; scoreEl.textContent = score;
        }
        // Collect shield
        if(p.shield && shieldTimer===0){
          p.shield = false;
          shieldTimer = 300;
          addFloat(player.x+PLAYER_W/2, p.y-20, 'SHIELD! +50', '#00e5ff');
          score += 50; scoreEl.textContent = score;
        }
        break;
      }
    }
  }

  // Move platforms
  for(var i=platforms.length-1;i>=0;i--){
    var p = platforms[i];
    if(p.type===P_MOVING){
      p.x += p.vx;
      if(p.x <= 0 || p.x + p.w >= W) p.vx = -p.vx;
    }
    if(p.broken && p.breakTimer > 0){ p.breakTimer--; }
    // Remove if below screen
    if(p.y > H + 60) platforms.splice(i, 1);
  }

  // Generate more platforms above
  var topY = H + 100;
  for(var i=0;i<platforms.length;i++){
    if(platforms[i].y < topY) topY = platforms[i].y;
  }
  if(topY > -H * 2){
    genPlatforms(topY - 10, -H * 3);
  }

  // Spawn enemies (score > 300 to let player warm up)
  var maxE = Math.min(2 + Math.floor(score/2000), 6);
  if(score > 300 && enemies.length < maxE && Math.random() < 0.004 + score*0.0000003){
    var etype = Math.random() < 0.35 ? 'fly' : 'walk';
    enemies.push({
      x:  Math.random()*(W-44),
      y:  -60,
      w:  40, h: 40,
      vx: (Math.random()>0.5?2:-2)*(1+score/25000),
      vy: etype==='fly'?0:0,
      type: etype,
      anim: Math.random()*Math.PI*2,
      col:  getTheme(score).enemyCol,
    });
  }

  // Update enemies
  for(var i=enemies.length-1;i>=0;i--){
    var e = enemies[i];
    e.x   += e.vx;
    e.anim += 0.07;
    if(e.type==='fly') e.y += Math.sin(e.anim)*1.8;
    if(e.x <= 0 || e.x + e.w >= W) e.vx = -e.vx;
    if(e.y > H + 80){ enemies.splice(i,1); continue; }
    // Hit player?
    var ex = e.x + e.w/2, ey = e.y + e.h/2;
    var px = player.x + PLAYER_W/2, py = player.y + PLAYER_H/2;
    var dx = px - ex, dy = py - ey;
    var dist = Math.sqrt(dx*dx+dy*dy);
    var hitR = (PLAYER_W/2 + e.w/2)*0.62;
    if(dist < hitR){
      if(shieldTimer > 0){
        shieldTimer = 1; // expire shield
        spawnBoomParts(ex, ey, e.col);
        enemies.splice(i,1);
        addFloat(px, py-30, 'BLOCKED!', '#00e5ff');
      } else if(player.vy > 2 && py < ey){
        // Stomped enemy from above
        player.vy = JUMP_VEL * 0.8;
        spawnBoomParts(ex, ey, e.col);
        enemies.splice(i,1);
        score += 200; scoreEl.textContent = score;
        addFloat(px, py-30, 'STOMP! +200', '#fbbf24');
      } else {
        gameOver(); return;
      }
    }
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
  // Floats
  for(var i=floats.length-1;i>=0;i--){
    var f=floats[i];f.y-=1.2;f.life-=0.02;if(f.life<=0) floats.splice(i,1);
  }
  // Bg decos scroll slowly
  for(var i=0;i<bgDecoItems.length;i++){
    bgDecoItems[i].y += bgDecoItems[i].spd;
    if(bgDecoItems[i].y > H+50) bgDecoItems[i].y = -50;
  }

  // Fall off bottom = game over
  if(player.y > H + 80) gameOver();
}

// ── DRAW ──────────────────────────────────────────────────────────────────
function drawBg(theme){
  var g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, theme.sky1);
  g.addColorStop(1, theme.sky2);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // Background decorations per theme
  ctx.save(); ctx.globalAlpha = 0.18;
  for(var i=0;i<bgDecoItems.length;i++){
    var d = bgDecoItems[i];
    if(theme.bgDeco==='trees'){
      // Simple tree silhouette
      ctx.fillStyle='#052e16';
      ctx.fillRect(d.x-d.size*0.15, d.y-d.size, d.size*0.3, d.size);
      ctx.beginPath();ctx.arc(d.x, d.y-d.size, d.size*0.55, 0, Math.PI*2);
      ctx.fill();
    } else if(theme.bgDeco==='stars'){
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(d.x, d.y, d.size*0.15, 0, Math.PI*2);ctx.fill();
    } else if(theme.bgDeco==='dunes'){
      ctx.fillStyle='#78350f';
      ctx.beginPath();ctx.ellipse(d.x, d.y+d.size*0.4, d.size*1.4, d.size*0.55, 0, 0, Math.PI*2);
      ctx.fill();
    } else if(theme.bgDeco==='snowflakes'){
      ctx.fillStyle='#e0f2fe';
      ctx.beginPath();ctx.arc(d.x,d.y,d.size*0.2,0,Math.PI*2);ctx.fill();
    } else if(theme.bgDeco==='ghosts'){
      ctx.fillStyle='#4c1d95';
      ctx.beginPath();ctx.arc(d.x,d.y,d.size*0.4,Math.PI,0);
      ctx.lineTo(d.x+d.size*0.4,d.y+d.size*0.3);
      ctx.lineTo(d.x,d.y+d.size*0.15);
      ctx.lineTo(d.x-d.size*0.4,d.y+d.size*0.3);
      ctx.closePath();ctx.fill();
    }
  }
  ctx.restore();
}

function drawPlatform(p, theme){
  if(p.broken && p.breakTimer<=0) return;
  ctx.save();
  if(p.broken){
    ctx.globalAlpha = p.breakTimer/18;
    ctx.translate(0, (18-p.breakTimer)*2);
  }
  // Shadow
  ctx.fillStyle = theme.platShadow;
  ctx.fillRect(p.x+3, p.y+5, p.w, p.h);
  // Body
  var g = ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
  g.addColorStop(0, theme.platCol);
  g.addColorStop(1, theme.platEdge);
  ctx.fillStyle = g;
  ctx.shadowColor = theme.platEdge; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 7);
  ctx.fill();
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.roundRect(p.x+4, p.y+2, p.w-8, p.h*0.45, 5);
  ctx.fill();
  ctx.shadowBlur=0;
  // Spring
  if(p.spring){
    ctx.fillStyle='#ff4444';
    ctx.fillRect(p.x+p.w/2-7, p.y-10, 14, 12);
    ctx.fillStyle='#ffaa00';
    ctx.fillRect(p.x+p.w/2-10, p.y-12, 20, 5);
  }
  // Jetpack icon
  if(p.jetpack){
    ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🚀', p.x+p.w/2, p.y-12);
  }
  // Shield icon
  if(p.shield){
    ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🛡', p.x+p.w/2, p.y-12);
  }
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x+e.w/2, e.y+e.h/2);
  if(e.type==='fly'){
    // Flying enemy — wing flap
    var flap = Math.sin(e.anim*3)*0.5;
    ctx.fillStyle = e.col; ctx.shadowColor=e.col; ctx.shadowBlur=10;
    // Wings
    ctx.save();ctx.rotate(-0.3+flap);
    ctx.beginPath();ctx.ellipse(-e.w*0.55,0,e.w*0.35,e.h*0.2,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.save();ctx.rotate(0.3-flap);
    ctx.beginPath();ctx.ellipse(e.w*0.55,0,e.w*0.35,e.h*0.2,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Body
    ctx.beginPath();ctx.arc(0,0,e.w*0.38,0,Math.PI*2);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-6,-5,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc( 6,-5,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(-6,-5,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc( 6,-5,3,0,Math.PI*2);ctx.fill();
  } else {
    // Walking monster
    var bob = Math.sin(e.anim)*2;
    ctx.fillStyle = e.col; ctx.shadowColor=e.col; ctx.shadowBlur=10;
    // Body
    ctx.beginPath();ctx.roundRect(-e.w*0.42,bob-e.h*0.42,e.w*0.84,e.h*0.84,8);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-8,bob-6,7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc( 8,bob-6,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(-8,bob-6,3.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc( 8,bob-6,3.5,0,Math.PI*2);ctx.fill();
    // Teeth
    ctx.fillStyle='#fff';
    ctx.fillRect(-8,bob+4,5,5);ctx.fillRect(-1,bob+4,5,5);ctx.fillRect(6,bob+4,5,5);
    // Horns
    ctx.fillStyle=e.col;
    ctx.beginPath();ctx.moveTo(-10,bob-e.h*0.42);ctx.lineTo(-14,bob-e.h*0.62);ctx.lineTo(-5,bob-e.h*0.42);ctx.fill();
    ctx.beginPath();ctx.moveTo(10,bob-e.h*0.42);ctx.lineTo(14,bob-e.h*0.62);ctx.lineTo(5,bob-e.h*0.42);ctx.fill();
  }
  ctx.restore();
}

function drawPlayer(){
  if(!player) return;
  ctx.save();
  ctx.translate(player.x+PLAYER_W/2, player.y+PLAYER_H/2);
  if(!player.right) ctx.scale(-1,1);

  // Jetpack flame
  if(jetpackTimer>0){
    ctx.save();
    ctx.fillStyle='#f97316';ctx.shadowColor='#ff6600';ctx.shadowBlur=15;
    var fl = 0.7+0.3*Math.sin(frame*0.5);
    ctx.beginPath();ctx.ellipse(8,PLAYER_H*0.2,5,12*fl,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.ellipse(8,PLAYER_H*0.15,3,7*fl,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Shield aura
  if(shieldTimer>0){
    ctx.save();
    ctx.globalAlpha=0.3+0.2*Math.sin(frame*0.15);
    ctx.strokeStyle='#00e5ff';ctx.lineWidth=3;ctx.shadowColor='#00e5ff';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(0,0,PLAYER_W*0.72,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // Body — big rounded square
  ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=8;ctx.shadowOffsetY=4;
  ctx.fillStyle='#22c55e';
  ctx.beginPath();ctx.roundRect(-PLAYER_W/2,-PLAYER_H/2,PLAYER_W,PLAYER_H,10);ctx.fill();
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;

  // Belly
  ctx.fillStyle='#86efac';
  ctx.beginPath();ctx.roundRect(-PLAYER_W/2+6,-PLAYER_H/2+6,PLAYER_W-12,PLAYER_H-14,6);ctx.fill();

  // Eyes
  var blink = (frame%90>85)?2:8;
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=3;
  ctx.beginPath();ctx.ellipse(-8,-PLAYER_H*0.12,7,blink,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse( 8,-PLAYER_H*0.12,7,blink,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(-8,-PLAYER_H*0.1,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc( 8,-PLAYER_H*0.1,3.5,0,Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-6,-PLAYER_H*0.14,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(10,-PLAYER_H*0.14,1.5,0,Math.PI*2);ctx.fill();

  // Nose
  ctx.fillStyle='#f97316';
  ctx.beginPath();ctx.ellipse(0,-PLAYER_H*0.02,4,3.5,0,0,Math.PI*2);ctx.fill();

  // Smile or worried face
  ctx.strokeStyle='#166534';ctx.lineWidth=2.5;ctx.lineCap='round';
  if(player.vy > 4){
    // Worried (falling)
    ctx.beginPath();ctx.arc(0,PLAYER_H*0.18,7,0.3,Math.PI-0.3,true);ctx.stroke();
  } else {
    // Happy (rising/landing)
    ctx.beginPath();ctx.arc(0,PLAYER_H*0.12,7,0.2,Math.PI-0.2);ctx.stroke();
  }

  // Nose gun / snout
  ctx.fillStyle='#16a34a';
  ctx.beginPath();ctx.roundRect(PLAYER_W/2-4,-2,10,4,2);ctx.fill();
  // Gun barrel
  ctx.fillStyle='#15803d';
  ctx.beginPath();ctx.roundRect(PLAYER_W/2+4,-1.5,8,3,1.5);ctx.fill();

  ctx.restore();
}

function draw(){
  var theme = getTheme(score);
  drawBg(theme);

  // Platforms
  for(var i=0;i<platforms.length;i++) drawPlatform(platforms[i], theme);

  // Enemies
  for(var i=0;i<enemies.length;i++) drawEnemy(enemies[i]);

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.save();ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Player
  if(player) drawPlayer();

  // Float texts
  for(var i=0;i<floats.length;i++){
    var f=floats[i];
    ctx.save();ctx.globalAlpha=Math.max(0,f.life);
    ctx.font='bold '+f.size+'px Nunito,sans-serif';
    ctx.textAlign='center';ctx.fillStyle=f.col;
    ctx.shadowColor=f.col;ctx.shadowBlur=8;
    ctx.fillText(f.text,f.x,f.y);
    ctx.restore();
  }

  // HUD score during play
  if(running){
    ctx.save();
    ctx.font='bold 28px Nunito,sans-serif';
    ctx.textAlign='left';ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=6;
    ctx.fillText(score, 16, 38);
    ctx.font='bold 13px Nunito,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.shadowBlur=0;
    ctx.fillText('BEST: '+best, 16, 56);
    ctx.restore();
  }
}

function loop(){
  draw();
  update();
  requestAnimationFrame(loop);
}

// ── INPUT ──────────────────────────────────────────────────────────────────
function getPos(e){
  var r=canvas.getBoundingClientRect();
  if(e.touches) return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};
  return{x:e.clientX-r.left,y:e.clientY-r.top};
}
canvas.addEventListener('touchstart',function(e){e.preventDefault();if(!running)return;var p=getPos(e);touching=true;touchX=p.x;},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();if(!running)return;var p=getPos(e);touchX=p.x;},{passive:false});
canvas.addEventListener('touchend',function(e){e.preventDefault();touching=false;},{passive:false});
canvas.addEventListener('mousedown',function(e){if(!running)return;touching=true;touchX=e.clientX;});
canvas.addEventListener('mousemove',function(e){if(touching)touchX=e.clientX;});
canvas.addEventListener('mouseup',function(){touching=false;});

// ── GAME FLOW ──────────────────────────────────────────────────────────────
function startGame(){
  ovEl.style.display='none';
  ovEl.classList.remove('dark');
  hudEl.style.display='none'; // Using canvas HUD instead
  initGame();
}

function gameOver(){
  running=false;
  if(score>best) best=score;
  setTimeout(function(){
    ovEl.style.display='flex';
    ovEl.classList.add('dark');
    ovEl.innerHTML=''
      +'<div class="ov-badge">Game Over</div>'
      +'<div class="ov-title" style="font-size:46px">DOODLE<br>JUMP!</div>'
      +'<div class="ov-score">'+score.toLocaleString()+'</div>'
      +'<div class="ov-best">BEST: '+best.toLocaleString()+'</div>'
      +'<div class="ov-sub">You reached: '+(lastThemeName||'FOREST')+'</div>'
      +'<button class="btn" id="startbtn">JUMP AGAIN!</button>';
    document.getElementById('startbtn').addEventListener('click',startGame);
    document.getElementById('startbtn').addEventListener('touchend',function(e){e.preventDefault();startGame();},{passive:false});
  },600);
}

startbtn.addEventListener('click',startGame);
startbtn.addEventListener('touchend',function(e){e.preventDefault();startGame();},{passive:false});

// Boot
var best=0;
var running=false;
loop();

})();
</script>
