<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CRAZY BULLET</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;background:#000;}
#c{display:block;position:fixed;inset:0;touch-action:none;}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:none;pointer-events:none;padding:10px 16px;flex-direction:row;align-items:center;justify-content:space-between;}
#score-el{font-family:Orbitron,sans-serif;font-size:20px;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(0,229,255,0.6);}
#lives-el{display:flex;gap:5px;align-items:center;}
.life{font-size:16px;transition:opacity .2s;}
.life.dead{opacity:0.15;}
#boss-bar-wrap{position:fixed;top:0;left:0;right:0;z-index:10;height:6px;background:rgba(255,0,0,0.15);display:none;}
#boss-bar{height:100%;background:linear-gradient(90deg,#ff0044,#ff6600);width:100%;transition:width 0.1s;}
#phase-el{position:fixed;top:10px;left:50%;transform:translateX(-50%);font-family:Orbitron,sans-serif;font-size:10px;font-weight:700;color:rgba(255,100,100,0.7);letter-spacing:2px;z-index:11;pointer-events:none;display:none;}
#ov{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:28px;background:radial-gradient(ellipse at center,#0a0005 0%,#000 100%);}
.t1{font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:4px;color:rgba(255,50,150,0.6);text-transform:uppercase;}
.t2{font-family:Orbitron,sans-serif;font-size:44px;font-weight:900;line-height:1;text-align:center;background:linear-gradient(135deg,#ff0080,#ff6600,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.t3{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;max-width:260px;line-height:1.7;}
.tips{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:12px 18px;width:100%;max-width:290px;display:flex;flex-direction:column;gap:7px;}
.tip{display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,255,255,0.65);font-weight:600;}
.sc{font-family:Orbitron,sans-serif;font-size:26px;font-weight:700;color:#ff0080;text-shadow:0 0 14px rgba(255,0,128,0.5);}
.btn{font-family:Orbitron,sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;padding:13px 44px;border:none;border-radius:50px;background:linear-gradient(135deg,#ff0080,#ff6600);color:#fff;cursor:pointer;box-shadow:0 6px 24px rgba(255,0,128,0.4);margin-top:4px;}
.btn:active{transform:scale(0.96);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="boss-bar-wrap"><div id="boss-bar"></div></div>
<div id="phase-el">PHASE 1</div>
<div id="hud">
  <div id="score-el">0</div>
  <div id="lives-el"></div>
</div>
<div id="ov">
  <div class="t1">Dodge Everything</div>
  <div class="t2">CRAZY<br>BULLET</div>
  <div class="t3">Dodge insane bullet patterns and shoot the boss down!</div>
  <div class="tips">
    <div class="tip"><span>👆</span>Drag anywhere to move your ship</div>
    <div class="tip"><span>🔫</span>Your ship auto-fires upward</div>
    <div class="tip"><span>💀</span>5 lives — touch a bullet and lose one</div>
    <div class="tip"><span>🌀</span>Boss fires spiral, ring and aimed patterns</div>
    <div class="tip"><span>⚡</span>Boss gets angrier each phase!</div>
  </div>
  <button class="btn" id="startbtn">PLAY</button>
  <div id="ovsc" class="sc" style="display:none"></div>
  <div id="ovinfo" style="font-size:11px;color:rgba(255,255,255,0.3);display:none;font-family:Orbitron,sans-serif;letter-spacing:1px;"></div>
</div>
<script>
var C=document.getElementById("c"),X=C.getContext("2d"),W,H;
function rsz(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
rsz();window.addEventListener("resize",rsz);

var hudEl=document.getElementById("hud"),scEl=document.getElementById("score-el"),
    livesEl=document.getElementById("lives-el"),bossBarWrap=document.getElementById("boss-bar-wrap"),
    bossBar=document.getElementById("boss-bar"),phaseEl=document.getElementById("phase-el"),
    ovEl=document.getElementById("ov"),startbtn=document.getElementById("startbtn"),
    ovsc=document.getElementById("ovsc"),ovinfo=document.getElementById("ovinfo");

// State
var ship,bullets,enemyBullets,particles,stars;
var score,best,lives,running,frame,phase,shake,inv;
var bossX,bossY,bossHp,bossMaxHp,bossAngle,bossTimer;
var shootTimer,dragX,dragY,dragging,bossDefeated;
var phaseFlashT=0;

var SHIP_R=10, HITBOX_R=5, BULLET_SPD=10;
var BOSS_PHASES=[
  {hp:150, speed:0.5, patterns:["spiral"],                              col:"#00e5ff", name:"PHASE 1"},
  {hp:220, speed:0.7, patterns:["spiral","ring"],                       col:"#ff0080", name:"PHASE 2"},
  {hp:300, speed:0.9, patterns:["spiral","aimed","ring"],               col:"#ff6600", name:"PHASE 3"},
  {hp:400, speed:1.2, patterns:["spiral","aimed","double"],             col:"#ffcc00", name:"PHASE 4"},
  {hp:500, speed:1.6, patterns:["ring","aimed","double","spiral"],      col:"#ff00ff", name:"FINAL PHASE"},
];

function makeStar(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4,spd:0.3+Math.random()*0.8,b:Math.random()*6.28};}
function makeStars(){stars=[];for(var i=0;i<100;i++)stars.push(makeStar());}

function initGame(){
  ship={x:W/2,y:H*0.82};
  bullets=[];enemyBullets=[];particles=[];
  score=0;lives=5;frame=0;phase=0;shake=0;inv=0;
  shootTimer=0;dragging=false;bossDefeated=false;
  dragX=W/2;dragY=H*0.82;
  if(!best)best=0;
  scEl.textContent="0";
  updateLives();
  initBoss();
}

function initBoss(){
  var pd=BOSS_PHASES[phase];
  bossDefeated=false;
  bossX=W/2; bossY=H*0.18;
  bossHp=pd.hp; bossMaxHp=pd.hp;
  bossAngle=0; bossTimer=0;
  phaseEl.textContent=pd.name;
  phaseEl.style.color=pd.col;
  phaseFlashT=90;
}

function updateLives(){
  livesEl.innerHTML="";
  for(var i=0;i<5;i++){
    var d=document.createElement("div");
    d.className="life"+(i>=lives?" dead":"");
    d.textContent="💜";
    livesEl.appendChild(d);
  }
}

// ── Bullet patterns ────────────────────────────────────────────────────────
function fireSpiral(){
  var pd=BOSS_PHASES[phase];
  var spd=2.5+phase*0.4;
  for(var i=0;i<5;i++){
    var a=bossAngle+i*(Math.PI*2/3);
    enemyBullets.push({x:bossX,y:bossY,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:5,col:pd.col,type:"spiral"});
  }
  bossAngle+=0.18+phase*0.04;
}

function fireRing(){
  var pd=BOSS_PHASES[phase];
  var count=10+phase*3;
  var spd=2.2+phase*0.3;
  for(var i=0;i<count;i++){
    var a=(i/count)*Math.PI*2;
    enemyBullets.push({x:bossX,y:bossY,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:5,col:pd.col,type:"ring"});
  }
}

function fireAimed(){
  var pd=BOSS_PHASES[phase];
  var dx=ship.x-bossX,dy=ship.y-bossY;
  var len=Math.sqrt(dx*dx+dy*dy)||1;
  var spd=3.5+phase*0.4;
  var spread=3;
  for(var i=-spread;i<=spread;i++){
    var a=Math.atan2(dy,dx)+i*0.12;
    enemyBullets.push({x:bossX,y:bossY,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:5,col:"#ffffff",type:"aimed"});
  }
}

function fireDouble(){
  var pd=BOSS_PHASES[phase];
  var spd=2.8+phase*0.3;
  var count=8+phase*2;
  for(var i=0;i<count;i++){
    var a=(i/count)*Math.PI*2+bossAngle;
    var spd2=spd*(1+0.4*Math.sin(i));
    enemyBullets.push({x:bossX,y:bossY,vx:Math.cos(a)*spd2,vy:Math.sin(a)*spd2,r:4,col:pd.col,type:"double"});
    enemyBullets.push({x:bossX,y:bossY,vx:Math.cos(a)*(spd2*0.55),vy:Math.sin(a)*(spd2*0.55),r:6,col:"#ff88ff",type:"double"});
  }
  bossAngle+=0.22;
}

// ── Update ─────────────────────────────────────────────────────────────────
function update(){
  if(!running)return;
  frame++;

  // move ship toward drag target
  if(dragging){
    ship.x+=(dragX-ship.x)*0.2;
    ship.y+=(dragY-ship.y)*0.2;
  }
  ship.x=Math.max(SHIP_R,Math.min(W-SHIP_R,ship.x));
  ship.y=Math.max(H*0.4,Math.min(H-SHIP_R*2,ship.y));

  // invincibility frames
  if(inv>0)inv--;

  // auto shoot
  shootTimer++;
  if(shootTimer>=5){
    shootTimer=0;
    bullets.push({x:ship.x,y:ship.y-SHIP_R,vy:-BULLET_SPD,life:1});
    bullets.push({x:ship.x-8,y:ship.y-SHIP_R+6,vy:-BULLET_SPD,life:1});
    bullets.push({x:ship.x+8,y:ship.y-SHIP_R+6,vy:-BULLET_SPD,life:1});
  }

  // move player bullets
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i];b.y+=b.vy;
    if(b.y<-10)bullets.splice(i,1);
  }

  // boss movement
  var pd=BOSS_PHASES[phase];
  bossX+=Math.sin(frame*0.015)*pd.speed*1.5;
  bossY=H*0.18+Math.sin(frame*0.008)*H*0.05;
  bossX=Math.max(60,Math.min(W-60,bossX));

  // boss fire patterns
  bossTimer++;
  var fireRate=Math.max(8,30-phase*5);
  if(bossTimer%fireRate===0){
    var patterns=pd.patterns;
    var pick=patterns[Math.floor(frame/80)%patterns.length];
    if(pick==="spiral")fireSpiral();
    else if(pick==="ring")fireRing();
    else if(pick==="aimed")fireAimed();
    else if(pick==="double")fireDouble();
  }
  // extra spiral always
  if(phase>=1&&bossTimer%(fireRate*2)===0)fireSpiral();

  // move enemy bullets
  for(var i=enemyBullets.length-1;i>=0;i--){
    var b=enemyBullets[i];
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20)enemyBullets.splice(i,1);
  }

  // player bullets hit boss
  if(bossDefeated){bullets=[];}
  var bossR=40+phase*5;
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i];
    var dx=b.x-bossX,dy=b.y-bossY;
    if(dx*dx+dy*dy<bossR*bossR){
      bullets.splice(i,1);
      bossHp--;
      score+=5;scEl.textContent=score;
      if(score>best)best=score;
      spawnPart(b.x,b.y,"#00e5ff",3);
      bossBar.style.width=Math.max(0,bossHp/bossMaxHp*100)+"%";
      if(bossHp<=0&&!bossDefeated){
        bossDefeated=true;
        bossExplode();
        phase++;
        if(phase>=BOSS_PHASES.length){gameWin();return;}
        enemyBullets=[];
        setTimeout(function(){initBoss();},1200);
        return;
      }
    }
  }

  // enemy bullets hit ship
  if(inv===0){
    for(var i=enemyBullets.length-1;i>=0;i--){
      var b=enemyBullets[i];
      var dx=b.x-ship.x,dy=b.y-ship.y;
      if(dx*dx+dy*dy<(HITBOX_R+b.r)*(HITBOX_R+b.r)){
        hitShip();
        break;
      }
    }
  }

  // particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }

  // stars
  for(var i=0;i<stars.length;i++){stars[i].y+=stars[i].spd;if(stars[i].y>H)stars[i]=makeStar();}

  // shake decay
  if(shake>0)shake*=0.82;
  if(phaseFlashT>0)phaseFlashT--;
}

function spawnPart(x,y,col,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1.5+Math.random()*2,col:col,life:1,decay:0.05+Math.random()*0.04});
  }
}

function bossExplode(){
  shake=20;
  for(var i=0;i<60;i++){
    var a=Math.random()*Math.PI*2,s=2+Math.random()*8;
    particles.push({x:bossX,y:bossY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3+Math.random()*6,col:["#ff0080","#ff6600","#ffcc00","#fff"][Math.floor(Math.random()*4)],life:1,decay:0.015+Math.random()*0.015});
  }
}

function hitShip(){
  lives--;updateLives();inv=120;shake=14;
  for(var i=0;i<20;i++){
    var a=Math.random()*Math.PI*2,s=1+Math.random()*5;
    particles.push({x:ship.x,y:ship.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,col:"#a855f7",life:1,decay:0.04+Math.random()*0.03});
  }
  if(lives<=0)gameOver();
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw(){
  X.save();
  if(shake>0.5)X.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  // bg
  X.fillStyle="#000008";X.fillRect(0,0,W,H);
  // stars
  for(var i=0;i<stars.length;i++){
    var s=stars[i];var br=0.15+0.5*Math.abs(Math.sin(frame*0.02+s.b));
    X.globalAlpha=br;X.fillStyle="#fff";X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // boss
  drawBoss();

  // player bullets
  X.save();X.fillStyle="#00e5ff";X.shadowColor="#00e5ff";X.shadowBlur=10;
  for(var i=0;i<bullets.length;i++){
    var b=bullets[i];X.beginPath();X.arc(b.x,b.y,3,0,Math.PI*2);X.fill();
  }
  X.restore();

  // enemy bullets
  for(var i=0;i<enemyBullets.length;i++) drawEnemyBullet(enemyBullets[i]);

  // particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];X.save();X.globalAlpha=Math.max(0,p.life);
    X.fillStyle=p.col;X.shadowColor=p.col;X.shadowBlur=6;
    X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();X.restore();
  }

  // ship
  drawShip();

  // phase flash
  if(phaseFlashT>0){
    X.save();X.globalAlpha=phaseFlashT/90*0.8;
    var pd=BOSS_PHASES[Math.min(phase,BOSS_PHASES.length-1)];
    X.font="bold 32px Orbitron,sans-serif";X.textAlign="center";X.textBaseline="middle";
    X.fillStyle=pd.col;X.shadowColor=pd.col;X.shadowBlur=30;
    X.fillText(pd.name,W/2,H/2);X.restore();
  }

  X.restore();
}

function drawBoss(){
  if(!running||phase>=BOSS_PHASES.length)return;
  var pd=BOSS_PHASES[phase];
  var r=40+phase*5;
  X.save();X.translate(bossX,bossY);
  // outer ring
  X.save();X.rotate(frame*0.02);
  var segments=8+phase*2;
  for(var i=0;i<segments;i++){
    var a=i/segments*Math.PI*2;
    var x2=Math.cos(a)*r,y2=Math.sin(a)*r;
    X.shadowColor=pd.col;X.shadowBlur=14;
    X.fillStyle=pd.col;X.beginPath();X.arc(x2,y2,4,0,Math.PI*2);X.fill();
  }
  X.restore();
  // counter-rotate ring
  X.save();X.rotate(-frame*0.015);
  for(var i=0;i<6;i++){
    var a=i/6*Math.PI*2;
    X.strokeStyle=pd.col;X.lineWidth=1.5;X.globalAlpha=0.4;
    X.beginPath();X.moveTo(0,0);X.lineTo(Math.cos(a)*r*0.85,Math.sin(a)*r*0.85);X.stroke();
  }
  X.globalAlpha=1;X.restore();
  // body
  var g=X.createRadialGradient(0,0,4,0,0,r*0.75);
  g.addColorStop(0,"#330010");g.addColorStop(0.5,"#1a0008");g.addColorStop(1,"rgba(0,0,0,0)");
  X.fillStyle=g;X.beginPath();X.arc(0,0,r*0.75,0,Math.PI*2);X.fill();
  // core
  X.shadowColor=pd.col;X.shadowBlur=30;
  X.fillStyle=pd.col;X.beginPath();X.arc(0,0,12,0,Math.PI*2);X.fill();
  X.fillStyle="#fff";X.beginPath();X.arc(0,0,5,0,Math.PI*2);X.fill();
  // eye
  X.fillStyle="#000";X.beginPath();X.arc(0,0,3,0,Math.PI*2);X.fill();
  // hp pulse ring
  if(bossHp/bossMaxHp<0.3){
    X.globalAlpha=0.3+0.3*Math.sin(frame*0.3);
    X.strokeStyle="#ff0000";X.lineWidth=3;X.shadowBlur=20;X.shadowColor="#ff0000";
    X.beginPath();X.arc(0,0,r+8,0,Math.PI*2);X.stroke();
    X.globalAlpha=1;
  }
  X.restore();
}

function drawEnemyBullet(b){
  X.save();X.shadowColor=b.col;X.shadowBlur=10;X.fillStyle=b.col;
  X.beginPath();X.arc(b.x,b.y,b.r,0,Math.PI*2);X.fill();
  // glow center
  X.fillStyle="#fff";X.beginPath();X.arc(b.x,b.y,b.r*0.4,0,Math.PI*2);X.fill();
  X.restore();
}

function drawShip(){
  if(!ship)return;
  X.save();X.translate(ship.x,ship.y);
  if(inv>0&&Math.floor(frame/4)%2===0){X.restore();return;}
  // engine glow
  var fl=0.5+0.5*Math.sin(frame*0.4);
  X.shadowColor="#a855f7";X.shadowBlur=18;
  X.fillStyle="rgba(168,85,247,"+fl+")";
  X.beginPath();X.ellipse(0,10,6,10*fl,0,0,Math.PI*2);X.fill();
  // ship body
  var g=X.createLinearGradient(-SHIP_R,-SHIP_R,SHIP_R,SHIP_R);
  g.addColorStop(0,"#e0b0ff");g.addColorStop(0.5,"#a855f7");g.addColorStop(1,"#4c1d95");
  X.fillStyle=g;X.shadowColor="#a855f7";X.shadowBlur=16;
  X.beginPath();
  X.moveTo(0,-SHIP_R);X.lineTo(SHIP_R,SHIP_R*0.6);
  X.lineTo(SHIP_R*0.4,SHIP_R*0.2);X.lineTo(-SHIP_R*0.4,SHIP_R*0.2);
  X.lineTo(-SHIP_R,SHIP_R*0.6);X.closePath();X.fill();
  // cockpit
  X.fillStyle="rgba(255,255,255,0.7)";X.beginPath();X.ellipse(0,-SHIP_R*0.1,3,5,0,0,Math.PI*2);X.fill();
  // hitbox (debug - remove for release)
  // X.strokeStyle="rgba(255,0,0,0.5)";X.lineWidth=1;X.beginPath();X.arc(0,0,HITBOX_R,0,Math.PI*2);X.stroke();
  X.restore();
}

function loop(){draw();update();requestAnimationFrame(loop);}

// Input
function getPos(e){var r=C.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top};}
C.addEventListener("touchstart",function(e){e.preventDefault();var p=getPos(e);dragging=true;dragX=p.x;dragY=p.y;},{passive:false});
C.addEventListener("touchmove",function(e){e.preventDefault();var p=getPos(e);dragX=p.x;dragY=p.y;},{passive:false});
C.addEventListener("touchend",function(e){e.preventDefault();dragging=false;},{passive:false});
C.addEventListener("mousedown",function(e){dragging=true;var p=getPos(e);dragX=p.x;dragY=p.y;});
C.addEventListener("mousemove",function(e){if(dragging){var p=getPos(e);dragX=p.x;dragY=p.y;}});
C.addEventListener("mouseup",function(){dragging=false;});

function startGame(){
  ovEl.style.display="none";
  hudEl.style.display="flex";
  bossBarWrap.style.display="block";
  phaseEl.style.display="block";
  makeStars();initGame();running=true;
}

function gameOver(){
  running=false;
  if(score>best)best=score;
  hudEl.style.display="none";bossBarWrap.style.display="none";phaseEl.style.display="none";
  ovEl.style.display="flex";
  ovsc.style.display="block";ovsc.textContent=score.toLocaleString();
  ovinfo.style.display="block";
  ovinfo.textContent="Phase "+(phase+1)+" · Best: "+best.toLocaleString();
  startbtn.textContent="TRY AGAIN";
}

function gameWin(){
  running=false;
  if(score>best)best=score;
  hudEl.style.display="none";bossBarWrap.style.display="none";phaseEl.style.display="none";
  ovEl.style.display="flex";
  ovsc.style.display="block";
  ovsc.style.color="#ffcc00";ovsc.style.textShadow="0 0 14px rgba(255,200,0,0.6)";
  ovsc.textContent=score.toLocaleString();
  ovinfo.style.display="block";
  ovinfo.textContent="ALL PHASES CLEARED! Best: "+best.toLocaleString();
  startbtn.textContent="PLAY AGAIN";
}

startbtn.addEventListener("click",startGame);
startbtn.addEventListener("touchend",function(e){e.preventDefault();startGame();},{passive:false});

// boot
stars=[];particles=[];bullets=[];enemyBullets=[];running=false;best=0;phase=0;
ship=null;
makeStars();loop();
</script>
</body>
