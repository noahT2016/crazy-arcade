<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLADE RUSH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@500;700;800&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;background:#0a0008;}
#game-canvas{display:block;position:fixed;inset:0;touch-action:none;}
#overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;padding:28px;
  background:radial-gradient(ellipse at 50% 50%,#0a001a 0%,#000005 100%);}
.ov-eyebrow{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;
  color:rgba(255,200,0,0.7);text-transform:uppercase;}
.ov-title{font-family:'Orbitron',sans-serif;font-size:52px;font-weight:900;
  line-height:1;text-align:center;
  background:linear-gradient(135deg,#ff6600,#ffcc00,#ff0066);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 24px rgba(255,150,0,0.5));}
.ov-sub{font-size:13px;color:rgba(255,255,255,0.5);
  text-align:center;max-width:280px;line-height:1.6;}
.ov-tips{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:14px 20px;display:flex;flex-direction:column;
  gap:8px;width:100%;max-width:300px;}
.tip{display:flex;align-items:center;gap:10px;
  font-family:'Exo 2',sans-serif;font-size:13px;color:rgba(255,255,255,0.7);font-weight:600;}
.tip-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.ov-score{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:700;
  color:#ffcc00;text-shadow:0 0 16px rgba(255,200,0,0.6);}
.btn-play{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:2px;padding:15px 50px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#ff6600,#ff0066);color:#fff;cursor:pointer;
  box-shadow:0 6px 24px rgba(255,100,0,0.4);transition:transform .15s;margin-top:6px;}
.btn-play:active{transform:scale(0.95);}
#hud{position:fixed;top:0;left:0;right:0;z-index:20;display:none;
  pointer-events:none;padding:12px 18px;align-items:center;justify-content:space-between;}
.hud-score{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;
  color:#fff;text-shadow:0 0 14px rgba(255,200,0,0.5);}
.hud-lives{display:flex;gap:6px;}
.life-icon{font-size:22px;transition:opacity .2s,transform .2s;}
.life-icon.lost{opacity:0.2;transform:scale(0.75);}
#combo-el{position:fixed;top:62px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;
  color:#ffcc00;text-shadow:0 0 12px rgba(255,200,0,0.8);
  letter-spacing:2px;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap;}
#combo-el.show{opacity:1;}
#mult-badge{position:fixed;top:14px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;
  padding:4px 14px;border-radius:20px;
  background:rgba(255,200,0,0.2);border:1px solid rgba(255,200,0,0.4);
  color:#ffcc00;letter-spacing:1px;pointer-events:none;opacity:0;
  transition:opacity 0.3s;z-index:25;}
#mult-badge.show{opacity:1;}
#freeze-overlay{position:fixed;inset:0;z-index:15;pointer-events:none;
  background:rgba(100,200,255,0);transition:background 0.3s;}
#freeze-overlay.active{background:rgba(100,200,255,0.08);}
#bomb-flash{position:fixed;inset:0;z-index:16;pointer-events:none;opacity:0;
  background:radial-gradient(circle,#ffffff 0%,#ff8800 30%,#ff2200 60%,transparent 100%);}
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="hud">
  <div class="hud-score" id="score-el">0</div>
  <div class="hud-lives" id="lives-el"></div>
</div>
<div id="combo-el"></div>
<div id="mult-badge">🍌 2x BONUS</div>
<div id="freeze-overlay"></div>
<div id="bomb-flash"></div>
<div id="overlay">
  <div class="ov-eyebrow">Swipe to Slash</div>
  <div class="ov-title">BLADE<br>RUSH</div>
  <div class="ov-sub">Slash fruits fast. Miss one and lose a life. Hit a bomb and it's over!</div>
  <div class="ov-tips">
    <div class="tip"><div class="tip-icon">🍉</div>Slash fruits to score points</div>
    <div class="tip"><div class="tip-icon">💣</div>Bomb hit = lose a life instantly</div>
    <div class="tip"><div class="tip-icon">⚡</div>Slash multiple at once for combo bonus</div>
    <div class="tip"><div class="tip-icon">🍌</div>Golden banana = 2x score multiplier</div>
    <div class="tip"><div class="tip-icon">🍌</div>Blue banana = slow motion mode</div>
  </div>
  <button class="btn-play" id="start-btn">SLASH IT</button>
</div>
<script>

const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── FRUIT TYPES ──────────────────────────
const FRUIT_TYPES = [
  { name:'watermelon', emoji:'🍉', color:'#22c55e', juice:'#ff4466', r:36, pts:1  },
  { name:'orange',     emoji:'🍊', color:'#f97316', juice:'#ffaa00', r:30, pts:1  },
  { name:'strawberry', emoji:'🍓', color:'#ef4444', juice:'#ff6688', r:26, pts:1  },
  { name:'grape',      emoji:'🍇', color:'#a855f7', juice:'#cc44ff', r:28, pts:1  },
  { name:'lemon',      emoji:'🍋', color:'#eab308', juice:'#ffee00', r:26, pts:1  },
  { name:'peach',      emoji:'🍑', color:'#fb923c', juice:'#ffcc88', r:28, pts:1  },
  { name:'blueberry',  emoji:'🫐', color:'#3b82f6', juice:'#66aaff', r:24, pts:2  },
  { name:'pineapple',  emoji:'🍍', color:'#facc15', juice:'#ffee44', r:32, pts:2  },
  { name:'goldenbanana', emoji:'🍌', color:'#ffd700', juice:'#ffee00', r:30, pts:5, special:'gold'   },
  { name:'icebanana',  emoji:'🍌', color:'#a5f3fc', juice:'#aaeeff', r:30, pts:3,  special:'freeze' },
  { name:'bomb',       emoji:'💣', color:'#374151', juice:'#ff0000', r:32, pts:0,  special:'bomb'   },
];

// ── STATE ────────────────────────────────
let fruits=[], particles=[], slashTrail=[], floatTexts=[];
let score=0, best=0, lives=3, multiplier=1, multTimer=0;
let frozen=false, frozenTimer=0;
let gameActive=false, running=false, frame=0;
let combo=0, comboTimer=0, shakeAmt=0;
let spawnTimer=0, spawnInterval=80, difficulty=1;
let isSlashing=false, lastSlash=null;

const overlay    = document.getElementById('overlay');
const scoreEl    = document.getElementById('score-el');
const livesEl    = document.getElementById('lives-el');
const comboEl    = document.getElementById('combo-el');
const multBadge  = document.getElementById('mult-badge');
const freezeOv   = document.getElementById('freeze-overlay');
const hud        = document.getElementById('hud');

// ── SPAWN ─────────────────────────────────
function spawnFruit() {
  const roll = Math.random();
  let type;
  if      (roll < 0.06 + difficulty*0.012) type = FRUIT_TYPES.find(f=>f.special==='bomb');
  else if (roll < 0.09)                    type = FRUIT_TYPES.find(f=>f.special==='gold');
  else if (roll < 0.12)                    type = FRUIT_TYPES.find(f=>f.special==='freeze');
  else {
    const normals = FRUIT_TYPES.filter(f=>!f.special);
    type = normals[Math.floor(Math.random()*normals.length)];
  }
  const x   = type.r*1.5 + Math.random()*(W - type.r*3);
  // Launch speed is ALWAYS full - frozen only slows movement after launch
  const launchSpd = 9 + Math.random()*3 + difficulty*0.8;
  const spd = launchSpd; // keep spd for vx calc
  // Calculate vx so fruit stays within screen bounds at peak height
  const vy0 = launchSpd + Math.random()*3;
  const gravity = 0.22;
  const timeUp = vy0 / gravity;          // frames to reach peak
  const maxDrift = timeUp * 2.2;         // max safe vx drift (pixels)
  const safeLeft  = -(x - type.r*2)   / timeUp;
  const safeRight =  (W - x - type.r*2) / timeUp;
  const rawVx = (Math.random()-0.5) * 3;
  const vx = Math.max(safeLeft * 0.7, Math.min(safeRight * 0.7, rawVx));
  fruits.push({
    type, x, y: H + type.r + 10,
    vx, vy: -vy0,
    rot: Math.random()*Math.PI*2,
    rotSpd: (Math.random()-0.5)*0.12,
    sliced:false, alive:true,
    missedLife: false,
  });
}

// ── SLICING ──────────────────────────────
function checkSlice(x1,y1,x2,y2) {
  let n=0;
  for (const f of fruits) {
    if (f.sliced||!f.alive) continue;
    if (lineCircle(x1,y1,x2,y2,f.x,f.y,f.type.r)) { sliceF(f); n++; }
  }
  if (n>1) {
    const bonus = n*5*multiplier;
    addScore(bonus);
    showFloat((x1+x2)/2,(y1+y2)/2-30,""+n+"x COMBO +"+bonus+"!",'#ffcc00',20);
    comboEl.textContent=""+n+"x COMBO!";
    comboEl.classList.add('show');
    comboTimer=90;
  }
}

function sliceF(f) {
  f.sliced=true;
  if (f.type.special==='bomb') {
    loseLife(f.x,f.y); spawnExplode(f.x,f.y); shakeAmt=30; return;
  }
  const pts=f.type.pts*multiplier;
  addScore(pts);
  showFloat(f.x, f.y-f.type.r-8, "+"+pts, f.type.juice, 17);
  spawnJuice(f.x,f.y,f.type.juice,f.type.r);
  spawnHalves(f);
  if (f.type.special==='gold')   { multiplier=2; multTimer=300; multBadge.classList.add('show'); showFloat(f.x,f.y-55,'2× ON!','#ffd700',19); }
  if (f.type.special==='freeze') { frozen=true; frozenTimer=220; freezeOv.classList.add('active'); showFloat(f.x,f.y-55,'SLOW MO!','#7dd3fc',19); }
}

function spawnHalves(f) {
  for (const s of [-1,1]) {
    particles.push({
      kind:'half', emoji:f.type.emoji,
      x:f.x, y:f.y,
      vx:f.vx+s*3+(Math.random()-0.5)*2, vy:f.vy*0.4-1,
      rot:f.rot, rotSpd:s*0.18, r:f.type.r*0.9,
      life:1, decay:0.011, side:s,
    });
  }
}

function spawnJuice(x,y,color,r) {
  for (let i=0;i<16;i++) {
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({ kind:'juice', x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, r:2+Math.random()*4, color, life:1, decay:0.03+Math.random()*0.02 });
  }
  particles.push({ kind:'splat', x,y, rot:Math.random()*Math.PI*2, rw:r*2.2, rh:r*1.2, color, life:0.65, decay:0.007 });
}

function spawnExplode(x,y) {
  // Lots of particles from center
  for (let i=0;i<55;i++) {
    const a=Math.random()*Math.PI*2, s=3+Math.random()*14;
    const cols=['#ff4400','#ff6600','#ff8800','#ffcc00','#fff'];
    particles.push({ kind:'juice', x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-4, r:3+Math.random()*7, color:cols[i%5], life:1, decay:0.016+Math.random()*0.018 });
  }
  // Big splat ring
  particles.push({ kind:'splat', x:W/2, y:H/2, rot:0, rw:W, rh:H, color:'#ff4400', life:0.7, decay:0.025 });
  // Screen flash
  triggerBombFlash();
}

function triggerBombFlash() {
  const flash = document.getElementById('bomb-flash');
  flash.style.opacity = '1';
  flash.style.transition = 'none';
  setTimeout(() => {
    flash.style.transition = 'opacity 0.6s ease-out';
    flash.style.opacity = '0';
  }, 40);
}

function lineCircle(x1,y1,x2,y2,cx,cy,r) {
  const dx=x2-x1,dy=y2-y1, fx=x1-cx, fy=y1-cy;
  const a=dx*dx+dy*dy, b=2*(fx*dx+fy*dy), c=fx*fx+fy*fy-r*r;
  let d=b*b-4*a*c; if(d<0) return false; d=Math.sqrt(d);
  const t1=(-b-d)/(2*a), t2=(-b+d)/(2*a);
  return (t1>=0&&t1<=1)||(t2>=0&&t2<=1);
}

// ── LIVES / SCORE ─────────────────────────
function loseLife(x,y) {
  lives=Math.max(0,lives-1); updateLivesUI();
  showFloat(x||W/2,y||H/2,'-1 LIFE','#ff4444',22);
  if(lives<=0) setTimeout(showGameOver,700);
}

function updateLivesUI() {
  livesEl.innerHTML='';
  for(let i=0;i<3;i++){
    const el=document.createElement('div');
    el.className='life-icon'+(i>=lives?' lost':'');
    el.textContent='❤️';
    livesEl.appendChild(el);
  }
}

function addScore(n) {
  score+=n; scoreEl.textContent=score;
  if(score>best) best=score;
}

function showFloat(x,y,text,color,size=16) {
  floatTexts.push({x,y,text,color,size,life:1,vy:-1.6});
}

// ── DRAW ─────────────────────────────────
function drawFruit(f) {
  if(f.sliced) return;
  const r=f.type.r, t=f.type;
  ctx.save();
  ctx.translate(f.x,f.y); ctx.rotate(f.rot);

  // outer glow
  ctx.shadowColor=t.color; ctx.shadowBlur=r*0.9;

  if(t.name==='watermelon') {
    // green rind
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    const g=ctx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
    g.addColorStop(0,'#86efac'); g.addColorStop(.5,'#22c55e'); g.addColorStop(1,'#14532d');
    ctx.fillStyle=g; ctx.fill();
    // red flesh inner circle
    ctx.beginPath(); ctx.arc(0,r*.08,r*.75,0,Math.PI*2);
    const r2=ctx.createRadialGradient(0,-r*.1,r*.1,0,r*.08,r*.75);
    r2.addColorStop(0,'#fca5a5'); r2.addColorStop(.5,'#ef4444'); r2.addColorStop(1,'#991b1b');
    ctx.fillStyle=r2; ctx.fill();
    // seeds
    ctx.fillStyle='#1c1917';
    for(let i=0;i<5;i++){const a=i*1.26,sr=r*.38;ctx.beginPath();ctx.ellipse(Math.cos(a)*sr,Math.sin(a)*sr,2.5,4,a,0,Math.PI*2);ctx.fill();}
  } else if(t.name==='orange') {
    const g=ctx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
    g.addColorStop(0,'#fed7aa'); g.addColorStop(.4,'#f97316'); g.addColorStop(1,'#7c2d12');
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    // texture bumps
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.8;
    for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);ctx.stroke();}
    // stem
    ctx.fillStyle='#15803d'; ctx.fillRect(-2,-r-5,4,7);
  } else if(t.name==='strawberry') {
    ctx.beginPath();
    ctx.moveTo(0,r); ctx.bezierCurveTo(r,r*0.5,r*1.1,-r*0.4,0,-r);
    ctx.bezierCurveTo(-r*1.1,-r*0.4,-r,r*0.5,0,r);
    const g=ctx.createRadialGradient(-r*.2,-r*.2,r*.1,0,0,r);
    g.addColorStop(0,'#fca5a5'); g.addColorStop(.5,'#ef4444'); g.addColorStop(1,'#7f1d1d');
    ctx.fillStyle=g; ctx.fill();
    // seeds
    ctx.fillStyle='rgba(255,240,180,0.8)';
    for(let i=0;i<8;i++){const a=i*0.78,sr=r*.5;ctx.beginPath();ctx.arc(Math.cos(a)*sr,Math.sin(a)*sr-r*.1,2,0,Math.PI*2);ctx.fill();}
    // leaf
    ctx.fillStyle='#16a34a'; ctx.beginPath();
    ctx.moveTo(0,-r); ctx.bezierCurveTo(-r*.5,-r*1.5,-r*.2,-r*1.8,0,-r*1.3);
    ctx.bezierCurveTo(r*.2,-r*1.8,r*.5,-r*1.5,0,-r); ctx.fill();
  } else if(t.name==='grape') {
    // cluster of grapes
    const gp=[[-r*.35,-r*.25],[r*.35,-r*.25],[0,-r*.5],[-r*.5,r*.1],[r*.5,r*.1],[0,r*.35],[-r*.25,r*.55],[r*.25,r*.55]];
    for(const [gx,gy] of gp){
      const gb=ctx.createRadialGradient(gx-3,gy-3,1,gx,gy,r*.32);
      gb.addColorStop(0,'#e9d5ff'); gb.addColorStop(.4,'#a855f7'); gb.addColorStop(1,'#4c1d95');
      ctx.beginPath(); ctx.arc(gx,gy,r*.32,0,Math.PI*2); ctx.fillStyle=gb; ctx.fill();
    }
    ctx.fillStyle='#4a2610'; ctx.fillRect(-2,-r*1.1,4,9);
  } else if(t.name==='lemon') {
    ctx.beginPath();
    ctx.ellipse(0,0,r*1.15,r*.85,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
    g.addColorStop(0,'#fef9c3'); g.addColorStop(.4,'#eab308'); g.addColorStop(1,'#713f12');
    ctx.fillStyle=g; ctx.fill();
    // nub ends
    ctx.fillStyle='#ca8a04';
    ctx.beginPath(); ctx.ellipse(r*1.05,0,r*.18,r*.12,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-r*1.05,0,r*.18,r*.12,0,0,Math.PI*2); ctx.fill();
  } else if(t.name==='peach') {
    const g=ctx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
    g.addColorStop(0,'#fde68a'); g.addColorStop(.35,'#fb923c'); g.addColorStop(.7,'#f43f5e'); g.addColorStop(1,'#7f1d1d');
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    // crease line
    ctx.strokeStyle='rgba(220,80,60,0.4)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,-r*.9); ctx.bezierCurveTo(r*.1,0,r*.1,0,0,r*.9); ctx.stroke();
    // stem
    ctx.strokeStyle='#15803d'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(0,-r); ctx.quadraticCurveTo(r*.3,-r*1.4,r*.2,-r*1.6); ctx.stroke();
  } else if(t.name==='blueberry') {
    const g=ctx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
    g.addColorStop(0,'#bfdbfe'); g.addColorStop(.4,'#3b82f6'); g.addColorStop(1,'#1e1b4b');
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    // crown
    ctx.strokeStyle='rgba(30,27,75,0.6)'; ctx.lineWidth=1.5;
    for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r*.45,Math.sin(a)*r*.45);ctx.stroke();}
    ctx.beginPath(); ctx.arc(0,0,r*.18,0,Math.PI*2);
    ctx.fillStyle='rgba(30,27,75,0.5)'; ctx.fill();
  } else if(t.name==='pineapple') {
    // body
    ctx.beginPath(); ctx.ellipse(0,r*.1,r*.8,r,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(-r*.3,-r*.2,r*.1,0,0,r);
    g.addColorStop(0,'#fef9c3'); g.addColorStop(.4,'#facc15'); g.addColorStop(1,'#78350f');
    ctx.fillStyle=g; ctx.fill();
    // diamond pattern
    ctx.strokeStyle='rgba(120,53,15,0.4)'; ctx.lineWidth=1;
    for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(i*r*.28-r,r*1.1);ctx.lineTo(i*r*.28+r,-r*.9);ctx.stroke();}
    for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(-r,i*r*.28+r*.2);ctx.lineTo(r,i*r*.28+r*.2);ctx.stroke();}
    // leaves
    ctx.fillStyle='#15803d';
    for(let i=0;i<5;i++){const a=-Math.PI/2+(i-2)*0.35;ctx.beginPath();ctx.moveTo(0,-r*.85);ctx.bezierCurveTo(Math.cos(a)*r*.3,-r*1.4,Math.cos(a)*r*.5,-r*1.7,Math.cos(a)*r*.4,-r*2);ctx.bezierCurveTo(Math.cos(a)*r*.15,-r*1.6,0,-r*1.2,0,-r*.85);ctx.fill();}
  } else if(t.special==='gold') {
    // golden banana shape
    ctx.beginPath();
    ctx.moveTo(-r*.9,r*.2);
    ctx.bezierCurveTo(-r*.9,-r*.6, r*.3,-r*.9, r*.9,-r*.2);
    ctx.bezierCurveTo(r*.75,-r*.05, -r*.6,-r*.35, -r*.7,r*.35);
    ctx.closePath();
    const g=ctx.createLinearGradient(-r,0,r,0);
    g.addColorStop(0,'#fbbf24'); g.addColorStop(.5,'#fef08a'); g.addColorStop(1,'#f59e0b');
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(234,179,8,0.6)'; ctx.lineWidth=1.5; ctx.stroke();
    // golden glow ring
    ctx.beginPath(); ctx.arc(0,0,r+6,0,Math.PI*2);
    ctx.strokeStyle="rgba(255,215,0,"+(0.5+0.4*Math.sin(frame*0.18))+")";
    ctx.lineWidth=3; ctx.shadowColor='#ffd700'; ctx.shadowBlur=20; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font="bold "+r*.5+"px serif";
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('★',0,0);
  } else if(t.special==='freeze') {
    // ice blue banana
    ctx.beginPath();
    ctx.moveTo(-r*.9,r*.2);
    ctx.bezierCurveTo(-r*.9,-r*.6, r*.3,-r*.9, r*.9,-r*.2);
    ctx.bezierCurveTo(r*.75,-r*.05, -r*.6,-r*.35, -r*.7,r*.35);
    ctx.closePath();
    const g=ctx.createLinearGradient(-r,0,r,0);
    g.addColorStop(0,'#7dd3fc'); g.addColorStop(.5,'#e0f2fe'); g.addColorStop(1,'#38bdf8');
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(125,211,252,0.7)'; ctx.lineWidth=1.5; ctx.stroke();
    // ice sparkles
    ctx.strokeStyle="rgba(200,240,255,"+(0.6+0.3*Math.sin(frame*0.2))+")";
    ctx.lineWidth=2; ctx.shadowColor='#7dd3fc'; ctx.shadowBlur=16;
    ctx.beginPath(); ctx.arc(0,0,r+6,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font="bold "+r*.5+"px serif";
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('❄',0,0);
  } else if(t.special==='bomb') {
    // bomb body
    const g=ctx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
    g.addColorStop(0,'#6b7280'); g.addColorStop(.5,'#374151'); g.addColorStop(1,'#111827');
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    // shine
    ctx.beginPath(); ctx.arc(-r*.28,-r*.28,r*.22,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();
    // fuse
    ctx.strokeStyle='#92400e'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(r*.3,-r*.7); ctx.bezierCurveTo(r*.6,-r*1.1,r*.2,-r*1.3,r*.4,-r*1.5); ctx.stroke();
    // spark
    const sc="rgba(255,"+(150+Math.floor(Math.sin(frame*0.3)*100))+",0,"+(0.7+0.3*Math.sin(frame*0.4))+")";
    ctx.fillStyle=sc; ctx.shadowColor='#ff6600'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(r*.4,-r*1.5,4,0,Math.PI*2); ctx.fill();
    // danger ring
    ctx.beginPath(); ctx.arc(0,0,r+5,0,Math.PI*2);
    ctx.strokeStyle="rgba(255,68,0,"+(0.4+0.4*Math.sin(frame*0.22))+")";
    ctx.lineWidth=2.5; ctx.shadowColor='#ff4400'; ctx.shadowBlur=14; ctx.stroke();
  } else {
    // fallback
    const g=ctx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
    g.addColorStop(0,lighten(t.color,55)); g.addColorStop(.5,t.color); g.addColorStop(1,darken(t.color,35));
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  }

  // universal shine on all fruits
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(-r*.28,-r*.28,r*.28,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();

  ctx.restore();
}

function drawParticle(p) {
  ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
  if(p.kind==='half') {
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.font=""+Math.floor(p.r*1.3)+"px serif";
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.save(); ctx.beginPath();
    if(p.side>0) ctx.rect(-p.r*2,-p.r*2,p.r*2,p.r*4);
    else         ctx.rect(0,-p.r*2,p.r*2,p.r*4);
    ctx.clip(); ctx.fillText(p.emoji,0,0); ctx.restore();
  } else if(p.kind==='juice') {
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  } else if(p.kind==='splat') {
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    const sg=ctx.createRadialGradient(0,0,0,0,0,p.rw);
    sg.addColorStop(0,p.color+'bb'); sg.addColorStop(1,p.color+'00');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.ellipse(0,0,p.rw,p.rh,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawTrail() {
  if(slashTrail.length<2) return;
  const now=Date.now();
  ctx.save();
  for(let i=1;i<slashTrail.length;i++){
    const a=slashTrail[i-1],b=slashTrail[i];
    const age=(now-b.t)/130; if(age>1) continue;
    const al=(1-age)*0.9, w=(1-age)*7;
    const g=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    g.addColorStop(0,"rgba(255,255,255,"+(al*0.4)+")");
    g.addColorStop(.5,"rgba(255,210,80,"+al+")");
    g.addColorStop(1,"rgba(255,80,0,"+(al*0.4)+")");
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=g; ctx.lineWidth=w; ctx.lineCap='round';
    ctx.shadowColor='rgba(255,180,0,0.6)'; ctx.shadowBlur=10; ctx.stroke();
  }
  ctx.restore();
}

function drawBg() {
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  bg.addColorStop(0,'#12000f'); bg.addColorStop(.5,'#0a0008'); bg.addColorStop(1,'#050005');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.018)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const vig=ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.95);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
}

// ── UPDATE ────────────────────────────────
function update() {
  frame++;
  const spd=frozen?0.35:1;
  if(multTimer>0)  { multTimer--;  if(multTimer===0)  { multiplier=1; multBadge.classList.remove('show'); } }
  if(frozenTimer>0){ frozenTimer--; if(frozenTimer===0){ frozen=false; freezeOv.classList.remove('active'); } }
  if(comboTimer>0) { comboTimer--; if(comboTimer===0) comboEl.classList.remove('show'); }
  if(shakeAmt>0)   shakeAmt*=0.82;

  difficulty = 1 + frame/2200;
  spawnInterval = Math.max(28, 80 - difficulty*9);
  spawnTimer++;
  if(spawnTimer>=spawnInterval) {
    spawnTimer=0;
    const burst = Math.random()<0.22 ? 2 : 1;
    for(let b=0;b<burst;b++) spawnFruit();
  }

  const grav=0.22*spd;
  for(let i=fruits.length-1;i>=0;i--) {
    const f=fruits[i];
    f.vy+=grav; f.vx*=0.999;
    f.x+=f.vx*spd; f.y+=f.vy*spd; f.rot+=f.rotSpd*spd;
    if(f.y>H+f.type.r*2) {
      if(!f.sliced&&f.type.special!=='bomb') loseLife(f.x,H-30);
      fruits.splice(i,1);
    }
    if(f.sliced) fruits.splice(i,1);
  }

  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    if(p.kind==='half'){ p.vy+=0.3*spd; p.x+=p.vx*spd; p.y+=p.vy*spd; p.rot+=p.rotSpd*spd; }
    else if(p.kind==='juice'){ p.vy+=0.25; p.x+=p.vx; p.y+=p.vy; p.vx*=0.95; }
    p.life-=p.decay; if(p.life<=0) particles.splice(i,1);
  }

  for(let i=floatTexts.length-1;i>=0;i--) {
    const ft=floatTexts[i]; ft.y+=ft.vy; ft.life-=0.022;
    if(ft.life<=0) floatTexts.splice(i,1);
  }

  const now=Date.now();
  slashTrail=slashTrail.filter(p=>now-p.t<160);
}

function draw() {
  ctx.save();
  if(shakeAmt>0.5) ctx.translate((Math.random()-.5)*shakeAmt,(Math.random()-.5)*shakeAmt);
  drawBg();
  for(const p of particles) if(p.kind==='splat') drawParticle(p);
  for(const f of fruits) drawFruit(f);
  for(const p of particles) if(p.kind!=='splat') drawParticle(p);
  drawTrail();
  for(const ft of floatTexts) {
    ctx.save(); ctx.globalAlpha=Math.max(0,ft.life);
    ctx.font="bold "+ft.size+"px Orbitron,cursive";
    ctx.textAlign='center'; ctx.fillStyle=ft.color;
    ctx.shadowColor=ft.color; ctx.shadowBlur=10;
    ctx.fillText(ft.text,ft.x,ft.y); ctx.restore();
  }
  ctx.restore();
}

function loop() {
  if(!running) return;
  update(); draw();
  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────
function pDown(x,y){ isSlashing=true; lastSlash={x,y}; slashTrail.push({x,y,t:Date.now()}); }
function pMove(x,y){
  if(!isSlashing||!lastSlash) return;
  slashTrail.push({x,y,t:Date.now()});
  const dx=x-lastSlash.x,dy=y-lastSlash.y;
  if(dx*dx+dy*dy>64){ checkSlice(lastSlash.x,lastSlash.y,x,y); lastSlash={x,y}; }
}
function pUp(){ isSlashing=false; lastSlash=null; }

canvas.addEventListener('mousedown', e=>{e.preventDefault();pDown(e.clientX,e.clientY);});
canvas.addEventListener('mousemove', e=>{e.preventDefault();pMove(e.clientX,e.clientY);});
canvas.addEventListener('mouseup',   e=>{e.preventDefault();pUp();});
canvas.addEventListener('touchstart',e=>{e.preventDefault();pDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();pMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();pUp();},{passive:false});

// ── GAME OVER ─────────────────────────────
function showGameOver() {
  running=false; hud.style.display='none';
  overlay.style.display='flex';
  overlay.innerHTML='<div class="ov-eyebrow">Game Over</div>'+'<div class="ov-title" style="font-size:40px;background:linear-gradient(135deg,#ff4444,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">SLICED<br>OUT</div>'+'<div class="ov-sub">You ran out of lives!</div>'+'<div class="ov-score">'+score.toLocaleString()+'</div>'+'<div class="ov-sub" style="color:rgba(255,200,50,0.55)">Best: '+best.toLocaleString()+'</div>'+'<button class="btn-play" id="start-btn" style="background:linear-gradient(135deg,#dc2626,#ea580c)">SLASH AGAIN</button>';
  document.getElementById('start-btn').addEventListener('click',startGame);
  document.getElementById('start-btn').addEventListener('touchend',e=>{e.preventDefault();startGame();},{passive:false});
}

// ── START ─────────────────────────────────
function startGame() {
  overlay.style.display='none'; hud.style.display='flex';
  fruits=[]; particles=[]; slashTrail=[]; floatTexts=[];
  score=0; lives=3; multiplier=1; multTimer=0;
  frozen=false; frozenTimer=0; shakeAmt=0; frame=0;
  spawnTimer=0; difficulty=1; isSlashing=false; lastSlash=null;
  scoreEl.textContent='0'; updateLivesUI();
  multBadge.classList.remove('show');
  freezeOv.classList.remove('active');
  comboEl.classList.remove('show');
  running=true; loop();
}

// ── UTILS ─────────────────────────────────
function lighten(hex,amt){const c=parseInt(hex.slice(1),16);return "rgb("+Math.min(255,((c>>16)&255)+amt)+","+Math.min(255,((c>>8)&255)+amt)+","+Math.min(255,(c&255)+amt)+")";}
function darken(hex,amt){return lighten(hex,-amt);}
function hexRgb(hex){const c=parseInt(hex.slice(1),16);return ((c>>16)&255)+","+((c>>8)&255)+","+(c&255);}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('start-btn').addEventListener('touchend',e=>{e.preventDefault();startGame();},{passive:false});

</script>
